###############################################
# Jenkins Infrastructure Variables
###############################################

# --- Jenkins version & integrity ---
# Single source of truth. Update both values together when upgrading.
# Retrieve checksum: curl -fsSL https://get.jenkins.io/war-stable/<version>/jenkins.war.sha256
jenkins_version: "2.555.3"
jenkins_war_sha256: "5d19905e6c0f23aff89ff007de5564b96e0a05c13f4d1a92d0fdcb69b033bb9a"

# --- Java ---
# Temurin major version. Must be supported by the Jenkins version above.
java_major_version: "25"
java_package: "temurin-{{ java_major_version }}-jdk"
java_home: "/usr/lib/jvm/temurin-{{ java_major_version }}-jdk-amd64"

# --- Jenkins OS user & directory layout ---
jenkins_username: jenkins
jenkins_home: /home/jenkins
jenkins_data_dir: /home/jenkins/.jenkins

# --- Jenkins service ---
jenkins_port: 8080
jenkins_install_dir: /opt/jenkins
jenkins_war_url: "https://get.jenkins.io/war-stable/{{ jenkins_version }}/jenkins.war"
jenkins_war_path: "{{ jenkins_install_dir }}/jenkins.war"

# --- Jenkins JVM tuning ---
# Override jenkins_heap_size per-host in inventory (e.g. "2G", "4G", "19G").
# Default "auto" selects a heap based on available RAM at run time.
jenkins_heap_size: "auto"

# --- Jenkins runtime arguments ---
jenkins_session_timeout: "--sessionTimeout=720 --sessionEviction=43200"
jenkins_accesslog: "--accessLoggerClassName=winstone.accesslog.SimpleAccessLogger --simpleAccessLogger.format=combined --simpleAccessLogger.file=/var/log/jenkins/access.log"

# Default listen address used on non-Vagrant hosts.
# The playbook auto-detects Vagrant (/vagrant exists) and overrides this to 0.0.0.0.
jenkins_listen_address: "127.0.0.1"

